<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oa314r8</title>
    <meta
      name="description"
      content="Personal GitHub Pages site for oa314r8."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f1e8;
        --card: rgba(255, 255, 255, 0.76);
        --text: #1e1d1a;
        --muted: #5f5a52;
        --accent: #b14d2f;
        --border: rgba(30, 29, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(177, 77, 47, 0.18), transparent 38%),
          linear-gradient(180deg, #fff9f2 0%, var(--bg) 100%);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(720px, 100%);
        padding: 48px 40px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--card);
        backdrop-filter: blur(8px);
        box-shadow: 0 24px 80px rgba(30, 29, 26, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.5rem, 6vw, 4.75rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        max-width: 40rem;
        font-size: 1.1rem;
        line-height: 1.7;
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>oa314r8</h1>
      <p>
        This GitHub Pages site is live and ready for content. Replace this page
        with your homepage, project links, writing, or anything else you want
        to publish on the web.
      </p>
    </main>
  </body>
</html>
